<!DOCTYPE html>
<html>
<head>

    <title>Search Music</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

{% include 'includes/navbar.html' %}

<div class="movie-detail-page">
<div class="container py-5">

    <a
        href="/music"
        class="btn btn-secondary rounded-pill mb-4">

        Back

    </a>

    <h1 class="text-white fw-bold mb-4">
        Search Music
    </h1>

    <form action="/music/search" method="GET">

        <div class="input-group mb-5 shadow">

            <input
                type="text"
                name="query"
                class="form-control"
                placeholder="Search artist..."
                value="{{ query }}">

            <button class="btn btn-primary">
                Search
            </button>

        </div>

    </form>

    {% if musics|length == 0 %}

    <div class="alert alert-warning">

        Artist not found

    </div>

    {% endif %}

    <div class="row">

        {% for music in musics %}

        <div class="col-md-3 mb-4">

            <div class="card h-100 bg-dark text-white border-0">

                <div class="card-body d-flex flex-column">

                    <h5 class="mb-3">
                        {{ music.artistName }}
                    </h5>

                    <div class="mt-auto">

                        <a
                            href="/music/{{ music.artistId }}"
                            class="btn btn-primary w-100">

                            View Recommendation

                        </a>

                    </div>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>
</div>

</body>
</html>
