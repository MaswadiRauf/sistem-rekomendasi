<!DOCTYPE html>
    <html>
    <head>

        <title>{{ movie.title }}</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">

        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}">

    </head>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <body>
        
    {% include 'includes/navbar.html' %}

    <div class="container mt-5">

        <a href="/" class="btn btn-dark mb-4">
            Back
        </a>

        <div class="row mb-5">

            <div class="col-md-4">

                <img
                    src="{{ movie.poster_url }}"
                    class="img-fluid rounded shadow">

            </div>

            <div class="col-md-8">

                <h1>
                    {{ movie.title }}
                </h1>

                <p>
                    {{ movie.genres }}
                </p>

            </div>

        </div>

        <hr>

        <p class="recommendation-text">

            Because you watched
            <span>{{ movie.title }}</span>

        </p>

        <div
        class="
        d-flex
        justify-content-between
        align-items-center
        mb-4">

        <h3>
            Top {{ top_n }} Recommendations
        </h3>

        <div>

            <a
                href="/movie/{{ movie.movieId }}?top=5"
                class="
                btn
                {% if top_n == 5 %}
                btn-primary
                {% else %}
                btn-outline-light
                {% endif %}
                ">

                Top 5

            </a>

            <a
                href="/movie/{{ movie.movieId }}?top=10"
                class="
                btn
                {% if top_n == 10 %}
                btn-primary
                {% else %}
                btn-outline-light
                {% endif %}
                ">

                Top 10

            </a>

        </div>

    </div>

    <div class="movie-row">

        {% for item in recommendations %}

        <a
            href="/movie/{{ item.movieId }}"
            class="movie-link">

            <div class="movie-card">

                <img
                    src="{{ item.poster }}"
                    alt="{{ item.title }}">

                <div class="movie-info">
                    
                    <h5>
                        {{ item.title }}
                    </h5>

                    <p>
                        {{ item.genres }}
                    </p>

                    <div class="movie-meta">

                        <span>
                            ⭐ {{ item.score }}
                        </span>

                        <span>
                            👥 {{ item.rating_count }}
                        </span>

                    </div>

                </div>

            </div>

        </a>

        {% endfor %}

    </div>

    </div>

    <script>

    const movieData = {

        title: "{{ movie.title }}",

        poster: "{{ movie.poster_url }}",

        id: "{{ movie.movieId }}"

    }

    let recentMovies = JSON.parse(
        localStorage.getItem("recentMovies")
    ) || []

    /* =========================================
    HAPUS DUPLIKAT
    ========================================= */

    recentMovies = recentMovies.filter(
        movie => movie.id !== movieData.id
    )

    /* =========================================
    TAMBAH FILM TERBARU KE DEPAN
    ========================================= */

    recentMovies.unshift(movieData)

    /* =========================================
    BATASI MAKSIMAL 12 FILM
    ========================================= */

    recentMovies = recentMovies.slice(0,12)

    /* =========================================
    SIMPAN
    ========================================= */

    localStorage.setItem(
        "recentMovies",
        JSON.stringify(recentMovies)
    )

    </script>

    </body>
    </html>
